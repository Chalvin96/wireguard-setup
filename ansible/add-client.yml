---
# Add a WireGuard peer to the VPS — run standalone, not part of site.yml.
# ansible-playbook ansible/add-client.yml --vault-password-file .vault_password
- name: Add WireGuard client
  hosts: ingress
  become: true
  vars_prompt:
    - name: client_name
      prompt: Client name (letters, numbers, hyphen, underscore only)
      private: false

  pre_tasks:
    - name: Validate client name
      ansible.builtin.assert:
        that: client_name | regex_search('^[a-zA-Z0-9_-]+$')
        fail_msg: >-
          Invalid client name — use only letters, numbers, hyphen, underscore
        success_msg: "Adding client '{{ client_name }}'"

  tasks:
    - name: Check client does not already exist
      ansible.builtin.command:
        cmd: 'grep -c "# Client: {{ client_name }}" /etc/wireguard/wg0-peers.conf'
      register: add_client_existing
      changed_when: false
      failed_when: add_client_existing.rc not in [0, 1]

    - name: Abort if client already exists
      ansible.builtin.fail:
        msg: "Client '{{ client_name }}' already exists in wg0-peers.conf"
      when: add_client_existing.stdout | int > 0

    - name: Generate WireGuard private key
      ansible.builtin.command:
        cmd: wg genkey
      register: add_client_privkey
      changed_when: false
      no_log: true

    - name: Derive public key
      ansible.builtin.command:
        cmd: wg pubkey
        stdin: "{{ add_client_privkey.stdout }}"
      register: add_client_pubkey
      changed_when: false
      no_log: true

    - name: Set public key fact
      ansible.builtin.set_fact:
        add_client_pubkey_value: "{{ add_client_pubkey.stdout }}"

    - name: Read current AllowedIPs
      ansible.builtin.command:
        cmd: grep -oP '10\.8\.0\.\K\d+' /etc/wireguard/wg0-peers.conf
      register: add_client_used_octets
      changed_when: false
      failed_when: add_client_used_octets.rc not in [0, 1]

    - name: Compute next free IP octet
      ansible.builtin.set_fact:
        add_client_next_octet: >-
          {{
            (range(3, 254) | list
             | difference(add_client_used_octets.stdout_lines | map('int') | list))
            | first
          }}

    - name: Add peer block to wg0-peers.conf
      ansible.builtin.blockinfile:
        path: /etc/wireguard/wg0-peers.conf
        create: true
        block: |
          [Peer]
          # Client: {{ client_name }}
          PublicKey = {{ add_client_pubkey_value }}
          AllowedIPs = 10.8.0.{{ add_client_next_octet }}/32
        marker: "# {mark} ANSIBLE MANAGED PEER {{ client_name }}"
        mode: "0600"

    - name: Apply peer without tunnel downtime
      ansible.builtin.command:
        cmd: wg addconf wg0 /etc/wireguard/wg0-peers.conf
      changed_when: true

    - name: Write client config to local file
      ansible.builtin.copy:
        content: |
          [Interface]
          PrivateKey = {{ add_client_privkey.stdout }}
          Address = 10.8.0.{{ add_client_next_octet }}/24
          DNS = 1.1.1.1

          [Peer]
          PublicKey = {{ vault_wireguard_server_public_key }}
          Endpoint = {{ ingress_ip }}:{{ wireguard_port }}
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
        dest: "./{{ client_name }}.conf"
        mode: "0600"
      delegate_to: localhost
      become: false
      no_log: true

    - name: Client config saved
      ansible.builtin.debug:
        msg: "Client config written to {{ client_name }}.conf — share securely with {{ client_name }}"
