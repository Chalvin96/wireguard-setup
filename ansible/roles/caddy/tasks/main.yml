---
- name: Install Caddy apt dependencies
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy-stable.key
    mode: "0644"

- name: Dearmor Caddy GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /etc/apt/keyrings/caddy-stable.key
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Add Caddy apt repository
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
    dest: /etc/apt/sources.list.d/caddy-stable.list
    mode: "0644"

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Require Cloudflare API token for Caddy DNS-01 challenges
  ansible.builtin.assert:
    that:
      - vault_caddy_cloudflare_api_token is defined
      - vault_caddy_cloudflare_api_token | length > 0
      - vault_caddy_cloudflare_api_token != "changeme-cloudflare-api-token"
    fail_msg: "Set vault_caddy_cloudflare_api_token in ansible/group_vars/all/vault.yml for Caddy Cloudflare DNS-01 certificate issuance."

- name: Check installed Caddy modules
  ansible.builtin.command:
    cmd: caddy list-modules
  register: caddy_modules
  changed_when: false

- name: Install Caddy Cloudflare DNS provider module
  ansible.builtin.command:
    cmd: caddy add-package github.com/caddy-dns/cloudflare@v0.2.4
  when: "'dns.providers.cloudflare' not in caddy_modules.stdout"
  notify: Restart Caddy

- name: Create Caddy systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: "0755"

- name: Write Caddy Cloudflare environment file
  ansible.builtin.template:
    src: cloudflare.env.j2
    dest: /etc/caddy/cloudflare.env
    mode: "0600"
    owner: root
    group: root
  no_log: true
  notify: Restart Caddy

- name: Configure Caddy systemd environment file
  ansible.builtin.template:
    src: caddy.service.override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: "0644"
    owner: root
    group: root
  notify: Restart Caddy

- name: Create Caddy log directory
  ansible.builtin.file:
    path: /var/log/caddy
    state: directory
    mode: "0755"
    owner: caddy
    group: caddy

- name: Check if Caddy access log already exists
  ansible.builtin.stat:
    path: /var/log/caddy/access.log
  register: caddy_access_log

- name: Fix existing access log permissions (group-readable for promtail)
  ansible.builtin.file:
    path: /var/log/caddy/access.log
    mode: "0640"
    owner: caddy
    group: caddy
  when: caddy_access_log.stat.exists

- name: Create Caddy conf.d directory
  ansible.builtin.file:
    path: /etc/caddy/conf.d
    state: directory
    mode: "0755"
    owner: root
    group: caddy

- name: Write Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
    owner: root
    group: caddy
    validate: caddy validate --config %s --adapter caddyfile
  environment:
    CLOUDFLARE_API_TOKEN: "{{ vault_caddy_cloudflare_api_token }}"
  notify: Restart Caddy

- name: Install nftables on mini PC
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Create /etc/nftables.d directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: Restrict Caddy metrics port to monitoring VM
  ansible.builtin.template:
    src: caddy-metrics.nft.j2
    dest: /etc/nftables.d/caddy-metrics.nft
    mode: "0644"
  notify: Reload nftables

- name: Include caddy-metrics in /etc/nftables.conf
  ansible.builtin.lineinfile:
    path: /etc/nftables.conf
    line: 'include "/etc/nftables.d/caddy-metrics.nft"'
    state: present
  notify: Reload nftables

- name: Enable nftables on mini PC
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
