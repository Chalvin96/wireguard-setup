# Bans IP on VPS via SSH + nftables with TTL matching bantime.
# No unban action — nftables TTL handles expiry automatically.
[Definition]
actionstart =
actionstop =
actioncheck =

actionban = ssh -i /root/.ssh/vps_ban \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=5 \
              -o BatchMode=yes \
              banagent@<vps_ip> "<ip> <bantime>"

actionunban =

[Init]
vps_ip = 127.0.0.1
