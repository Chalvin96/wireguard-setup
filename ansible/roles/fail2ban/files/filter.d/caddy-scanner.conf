[INCLUDES]
before = common.conf

[Definition]
# Matches requests to known scanner/exploit paths in Caddy JSON access logs.
# Caddy logs one JSON object per line; remote_ip appears inside the request object.
_scan_paths = (?:/\.env|/wp-admin|/wp-login\.php|/xmlrpc\.php|/\.git|/phpmyadmin|/shell|/admin\.php|/config\.php|/backup|/\.aws|/\.ssh)

failregex = ^{"level":"info".*?"remote_ip":"<HOST>".*?"uri":"<_scan_paths>
            ^{"level":"info".*?"uri":"<_scan_paths>.*?"remote_ip":"<HOST>"

ignoreregex =

datepattern = "ts"\s*:\s*<EPOCH>
