---
# Full stack deploy — runs in dependency order.
# Run: ansible-playbook ansible/site.yml --vault-password-file .vault_password

- name: VPS — WireGuard server
  hosts: ingress
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - wireguard-server

- name: VPS — HAProxy ingress
  hosts: ingress
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - haproxy

- name: VPS — nftables blocklist + banagent
  hosts: ingress
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - vps-blocklist

- name: Edge — Caddy reverse proxy
  hosts: edge
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - caddy

- name: Edge — fail2ban scanner detection
  hosts: edge
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - fail2ban

- name: Edge — Promtail log shipping
  hosts: edge
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - promtail

- name: Monitoring VM — observability stack
  hosts: monitoring
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - monitoring
