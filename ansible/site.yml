---
# Full stack deploy — runs in dependency order.
# Run: ansible-playbook ansible/site.yml --vault-password-file .vault_password

- name: VPS — ingress stack
  hosts: ingress
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - wireguard-server
    - haproxy
    - vps-blocklist
    - fail2ban
    - crowdsec

- name: Edge — reverse proxy + security stack
  hosts: edge
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - caddy
    - fail2ban
    - promtail
    - crowdsec

- name: Monitoring VM — observability stack
  hosts: monitoring
  become: true
  gather_facts: true
  gather_subset:
    - network
    - distribution
  roles:
    - monitoring
